<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Word Score Game</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#f8fafc; }
.rotate-180 { transform: rotate(180deg); }
.score-grid { display:grid; grid-template-columns:repeat(15,minmax(0,1fr)); gap:2px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const WORDS = ["Love","Heart","Feel","Cry","Smile","Pain","Fear","Hope","Dream","Tear","Alone","Lonely","Happy","Sad","Hate","Miss","Wish","Joy","Peace","Mad","Glad","Proud","Sweet","Cold","Warm","Dark","Light","Blind","Free","You","Me","I","We","They","He","She","Us","Them","Baby","Girl","Boy","Man","Woman","Mother","Father","Friend","Enemy","Lover","Stranger","Angel","Devil","Queen","King","Hero","Star","Soul","Child","Mind","Time","Day","Night","Morning","Evening","Always","Never","Forever","Now","Then","Soon","Today","Yesterday","Tomorrow","Year","Life","World","Earth","Sky","Home","Place","Road","Street","City","Way","Path","Here","There","Where","Go","Come","Run","Walk","Dance","Sing","Say","Talk","Listen","Look","See","Hear","Touch","Taste","Breathe","Laugh","Sleep","Wake","Stand","Fall","Fly","Rise","Wait","Stop","Hold","Keep","Let","And","Or","But","So","Because","If","With","Without","For","To","In","On","At","By","From","Out","Up","Down","Over","Under","Through","About","Like","As","Than","Not","Yes","No","Maybe","Yeah","Oh","Hey","Ah","U","Ya","Just","Really","Very","Well","Woah","Damn","Shh","Ahh","Come-on","Do","Did","Done","Be","Am","Is","Are","Was","Were","Been","Have","Has","Had","Will","Would","Can","Could","Should","Must","May","Might","Want","Need","Think","Know","Believe","Remember","Forget","Good","Bad","Big","Small","Little","Tall","Short","Long","Fast","Slow","Hard","Soft","True","False","Real","Fake","Right","Wrong","High","Low","New","Old","Young","Rich","Poor","Bright","Dim","Loud","Quiet"];

const ROWS = 8;
const SPACES = 15;

let currentWord = WORDS[Math.floor(Math.random()*WORDS.length)];
let positions = Array(ROWS).fill(0);
let names = Array(ROWS).fill("");
let winner = null;

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function nextWord(){
  let next = currentWord;
  while(next === currentWord){
    next = WORDS[Math.floor(Math.random()*WORDS.length)];
  }
  currentWord = next;
  render();
}

function move(row,dir){
  positions[row] = Math.max(0,Math.min(SPACES-1,positions[row]+dir));
  if(positions[row] === SPACES-1){
    winner = names[row] || `Player ${row+1}`;
  }
  render();
}

function clearNames(){
  names = Array(ROWS).fill("");
  render();
}

function resetScores(){
  positions = Array(ROWS).fill(0);
  winner = null;
  render();
}

function render(){
  const app = document.getElementById("app");

  if(winner){
    app.innerHTML = `
    <div class="min-h-screen bg-black text-white flex items-center justify-center p-4 text-center">
      <div class="w-full max-w-4xl rounded-3xl border border-white/20 bg-white/10 p-6 shadow-2xl">
        <div class="text-3xl md:text-5xl font-bold">CONGRATULATIONS!</div>
        <div class="text-6xl md:text-9xl font-black mt-6 break-words">${escapeHtml(winner)}</div>
        <div class="mt-6 text-xl md:text-3xl font-semibold text-white/80">You made it to the finish!</div>
        <button onclick="resetScores()" class="mt-8 bg-white text-black px-6 py-3 rounded-xl text-xl font-bold">
          Play Again
        </button>
      </div>
    </div>`;
    return;
  }

  app.innerHTML = `
  <div class="min-h-screen p-2 flex flex-col gap-2 overflow-hidden">

    <div class="bg-white rounded-2xl border p-3 shadow">
      <button onclick="nextWord()" class="w-full">
        <div class="bg-black text-white rounded-2xl p-3">
          <div class="rotate-180 text-center text-4xl sm:text-5xl font-black uppercase">
            ${escapeHtml(currentWord)}
          </div>
        </div>

        <div class="text-center text-4xl sm:text-5xl font-black uppercase mt-4">
          ${escapeHtml(currentWord)}
        </div>

        <div class="text-xs text-gray-500 mt-2">
          Tap word for another word
        </div>
      </button>
    </div>

    <div class="bg-white rounded-2xl border p-2 shadow flex-1 overflow-auto">

      <div class="flex gap-2 justify-center mb-2 flex-wrap">
        <button onclick="clearNames()" class="bg-gray-200 px-3 py-2 rounded-xl text-sm font-bold">
          Clear Names
        </button>

        <button onclick="resetScores()" class="bg-gray-200 px-3 py-2 rounded-xl text-sm font-bold">
          Reset Scores
        </button>

        <button onclick="nextWord()" class="bg-black text-white px-3 py-2 rounded-xl text-sm font-bold">
          New Word
        </button>
      </div>

      <div class="space-y-1">
        ${positions.map((position,rowIndex)=>`
          <div class="grid grid-cols-[40px_90px_1fr_40px] gap-1 items-center">

            <button onclick="move(${rowIndex},-1)" class="h-9 rounded-xl bg-gray-200 font-black text-lg">
              −
            </button>

            <input
              type="text"
              value="${escapeHtml(names[rowIndex])}"
              placeholder="Player ${rowIndex+1}"
              oninput="names[${rowIndex}] = this.value"
              class="h-9 rounded-xl border px-2 text-xs font-semibold"
            />

            <div class="score-grid border rounded-xl p-[2px] bg-gray-50 shadow-inner">
              ${Array.from({length:SPACES}).map((_,spaceIndex)=>`
                <div class="relative h-7 sm:h-8 rounded-md bg-gray-100 border overflow-hidden">
                  ${position===spaceIndex ? `
                    <div class="absolute inset-[1px] rounded-md bg-black text-white text-[9px] sm:text-[10px] flex items-center justify-center font-bold leading-none px-[1px] text-center">
                      ${escapeHtml(names[rowIndex] || rowIndex+1)}
                    </div>` : ``}
                </div>
              `).join("")}
            </div>

            <button onclick="move(${rowIndex},1)" class="h-9 rounded-xl bg-gray-200 font-black text-lg">
              +
            </button>

          </div>
        `).join("")}
      </div>

    </div>
  </div>`;
}

render();
</script>
</body>
</html>
